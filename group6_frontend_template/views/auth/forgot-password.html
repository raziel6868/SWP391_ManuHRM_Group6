<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ManuHRM - Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../../assets/css/main.css" rel="stylesheet"/>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-surface text-on-surface">
    <div class="w-100 p-4" style="max-width: 450px;">
        <!-- Card -->
        <div class="card-premium p-4 p-md-5">
            <!-- Brand / Header -->
            <div class="text-center mb-4">
                <h1 class="h2 text-primary fw-bold mb-2">ManuHRM</h1>
                <p class="body-md text-on-surface-variant">Reset your password to regain access.</p>
            </div>
            
            <!-- Form -->
            <form action="#" method="POST" class="d-flex flex-column gap-4">
                <div>
                    <label for="email" class="form-label label-sm text-on-surface mb-2">Corporate Email</label>
                    <div class="position-relative">
                        <span class="material-symbols-outlined position-absolute top-50 translate-middle-y text-outline" style="left: 12px;">mail</span>
                        <input type="email" id="email" name="email" class="input-premium w-100" placeholder="name@company.com" required style="padding-left: 2.5rem;"/>
                    </div>
                </div>
                
                <!-- Action Button -->
                <button type="submit" class="btn-primary-gradient w-100">
                    <span>Send Reset Link</span>
                    <span class="material-symbols-outlined" style="font-size: 1.125rem;">arrow_forward</span>
                </button>
            </form>
            
            <!-- Back to Login -->
            <div class="mt-4 text-center">
                <a href="login.html" class="d-inline-flex align-items-center gap-1 label-sm text-on-surface-variant text-decoration-none hover-primary">
                    <span class="material-symbols-outlined" style="font-size: 1rem;">arrow_back</span>
                    Back to Login
                </a>
            </div>
        </div>
    </div>
</body>
</html>
