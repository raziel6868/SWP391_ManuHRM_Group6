name: SWP391 PR Verification

on:
  pull_request:
    branches: [ "main" ]

jobs:
  check-formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Check Code Formatting
        run: |
          mvn spotless:check || (echo "ERROR: Code is not formatted! Please run 'mvn spotless:apply' locally and commit again." && exit 1)

  check-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Scan for Hardcoded Secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true

  check-jsp-and-webxml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check for JSP Scriptlets
        run: |
          if grep -rnE '<%[^@=\-]' src/main/webapp/; then
            echo "ERROR: JSP Scriptlets detected!" && exit 1
          fi
      - name: Check for Servlet in web.xml
        run: |
          if [ -f "src/main/webapp/WEB-INF/web.xml" ] && grep -q "<servlet>" src/main/webapp/WEB-INF/web.xml; then
            echo "ERROR: <servlet> tags not allowed in web.xml" && exit 1
          fi

  build-and-test:
    runs-on: ubuntu-latest
    needs: [check-formatting, check-security, check-jsp-and-webxml]
    steps:
      - uses: actions/checkout@v6
      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Verify Build
        run: mvn clean compile -q
      - name: Run Tests and Coverage
        run: |
          if [ -d "src/test/java" ] && [ "$(ls -A src/test/java)" ]; then
            mvn org.jacoco:jacoco-maven-plugin:0.8.14:prepare-agent test org.jacoco:jacoco-maven-plugin:0.8.14:report -q
          fi
