<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reset Password - ManuHRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../../assets/css/main.css" rel="stylesheet"/>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-surface-container-low text-on-surface">
    <main class="w-100 px-4 py-5" style="max-width: 480px;">
        <!-- Card -->
        <div class="card-premium p-4 p-md-5 position-relative overflow-hidden">
            <!-- Subtle top accent -->
            <div class="position-absolute top-0 start-0 w-100" style="height: 4px; background: var(--primary-gradient);"></div>
            
            <!-- Branding Header -->
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center mb-3 rounded shadow-sm border border-outline-variant" style="width: 48px; height: 48px; background-color: var(--surface-container);">
                    <span class="material-symbols-outlined text-primary" style="font-size: 1.75rem; font-variation-settings: 'FILL' 1;">lock_reset</span>
                </div>
                <h1 class="h3 text-on-background mb-2">Reset Password</h1>
                <p class="body-md text-on-surface-variant">Please create a new, secure password for your ManuHRM account.</p>
            </div>
            
            <!-- Form -->
            <form action="#" method="POST" class="d-flex flex-column gap-4">
                <!-- New Password -->
                <div>
                    <label for="new-password" class="form-label label-md text-on-surface mb-2">New Password</label>
                    <div class="position-relative">
                        <span class="material-symbols-outlined position-absolute top-50 translate-middle-y text-on-surface-variant" style="left: 12px;">key</span>
                        <input type="password" id="new-password" name="new-password" class="input-premium w-100" placeholder="Enter new password" required style="padding-left: 2.5rem;"/>
                    </div>
                </div>
                
                <!-- Confirm Password -->
                <div>
                    <label for="confirm-password" class="form-label label-md text-on-surface mb-2">Confirm Password</label>
                    <div class="position-relative">
                        <span class="material-symbols-outlined position-absolute top-50 translate-middle-y text-on-surface-variant" style="left: 12px;">lock</span>
                        <input type="password" id="confirm-password" name="confirm-password" class="input-premium w-100" placeholder="Confirm new password" required style="padding-left: 2.5rem;"/>
                    </div>
                </div>
                
                <!-- Password Requirements -->
                <div class="p-3 rounded bg-surface-container border border-outline-variant text-on-surface-variant" style="font-size: 0.875rem;">
                    <p class="label-sm fw-bold mb-2">Password Requirements:</p>
                    <ul class="mb-0 ps-3">
                        <li>Minimum 8 characters</li>
                        <li>At least one uppercase letter</li>
                        <li>At least one number</li>
                    </ul>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" class="btn-primary-gradient w-100">
                    Reset Password
                </button>
            </form>
            
            <!-- Footer Links -->
            <div class="mt-4 text-center">
                <a href="login.html" class="d-inline-flex align-items-center gap-1 label-md text-primary text-decoration-none hover-primary">
                    <span class="material-symbols-outlined" style="font-size: 1rem;">arrow_back</span>
                    Back to Login
                </a>
            </div>
        </div>
        
        <!-- System Branding Footer -->
        <div class="mt-4 text-center text-on-surface-variant label-sm">
            ManuHRM Industrial Solutions &copy; 2024
        </div>
    </main>
</body>
</html>
