<!-- Alert Component -->
<div class="alert alert-dismissible fade show d-flex align-items-center gap-2 mb-4" role="alert" style="background-color: var(--surface-container-lowest); border-radius: var(--rounded-md); border: 1px solid var(--outline-variant); border-left: 4px solid var(--primary); box-shadow: var(--shadow-premium);">
  <span class="material-symbols-outlined text-primary">info</span>
  <div class="flex-grow-1 text-on-surface body-sm">
    <strong>Thông báo hệ thống:</strong> Nội dung thông báo hiển thị ở đây.
  </div>
  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>
