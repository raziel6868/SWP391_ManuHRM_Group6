# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "vi-VN"

reviews:
  # Crucial: Keep the tone "chill" so junior devs don't feel pressured
  profile: "chill"
  
  # Force AI to format Pull Request titles properly
  auto_title_instructions: 'Format: "<category>: <title>". Allowed categories: feat (new feature), fix (bug fix), docs (documentation), refactor (code optimization). Example: "feat: Add Login functionality".'
  
  # Collapse the walkthrough table to reduce clutter on GitHub
  collapse_walkthrough: true
  
  # Disable poems for a more serious tone
  poem: false
  
  # Set PR commit status to pending while AI is reviewing
  commit_status: true

tone_and_style_guidelines: |
  You are a helpful and instructive Technical Lead reviewing university students' code for a pure Java Web project.
  THIS IS A LEGACY SYSTEM. PLEASE ENFORCE THE FOLLOWING RULES GENTLY:
  
  1. DO NOT suggest Spring Boot, Spring MVC, Spring Data, Hibernate, or JPA. Only Java Jakarta EE 10 (Servlets, JSP) and pure JDBC are allowed.
  2. Remind students to avoid Scriptlets (<%...%>) in JSP files. Suggest JSTL or EL instead.
  3. Point out if Servlets are defined in `web.xml`. The `@WebServlet` annotation is mandatory.
  4. Allow `web.xml` only for Filters, Error Pages, and Session Timeout configurations.
  5. Accept simple architectures (e.g., Servlets calling DAOs directly). Avoid suggesting complex patterns like Repositories, Service interfaces, or Clean Architecture.
  6. Flag any hardcoded database credentials or API keys. Recommend the use of environment variables.
  7. Provide your review feedback entirely in Vietnamese with an encouraging tone.
