<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ManuHRM - Login</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="../../assets/css/main.css" rel="stylesheet"/>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-background text-on-background">
    <main class="w-100" style="max-width: 420px; padding: 1rem;">
        <!-- Minimalist Brand Identifier -->
        <div class="d-flex justify-content-center mb-4">
            <span class="material-symbols-outlined text-primary" style="font-size: 3rem; font-variation-settings: 'FILL' 1;">precision_manufacturing</span>
        </div>
        
        <!-- Card -->
        <div class="card-premium overflow-hidden">
            <!-- Structural Accent Line -->
            <div style="height: 4px; background-color: var(--primary); width: 100%;"></div>
            
            <div class="card-body" style="padding: 2rem;">
                <!-- Header -->
                <div class="text-center mb-4">
                    <h1 class="h2 text-on-surface mb-2">Login to ManuHRM</h1>
                    <p class="body-md text-on-surface-variant">Enter your credentials to access the system.</p>
                </div>
                
                <!-- Form -->
                <form action="#" method="POST" class="d-flex flex-column gap-3">
                    <!-- Username -->
                    <div>
                        <label for="username" class="form-label label-md text-on-surface mb-1">Username or Employee Code</label>
                        <input type="text" id="username" name="username" class="input-premium" required autocomplete="username"/>
                    </div>
                    
                    <!-- Password -->
                    <div>
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label for="password" class="form-label label-md text-on-surface mb-0">Password</label>
                            <a href="forgot-password.html" class="body-sm text-primary text-decoration-none hover-primary">Forgot Password?</a>
                        </div>
                        <input type="password" id="password" name="password" class="input-premium" required autocomplete="current-password"/>
                    </div>
                    
                    <!-- Action Area -->
                    <div class="mt-2">
                        <button type="submit" class="btn-primary-gradient w-100">
                            <span>Login</span>
                            <span class="material-symbols-outlined" style="font-size: 1.25rem;">login</span>
                        </button>
                    </div>
                </form>
            </div>
            
            <!-- Secondary Context -->
            <div class="bg-surface-container-low border-top py-3 text-center" style="border-color: var(--outline-variant) !important;">
                <p class="label-md text-on-surface-variant mb-0 d-flex align-items-center justify-content-center gap-2">
                    <span class="material-symbols-outlined" style="font-size: 1rem;">lock</span>
                    Authorized Personnel Only
                </p>
            </div>
        </div>
    </main>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
